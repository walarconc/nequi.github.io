const quizEl = document.getElementById('quiz');

function render(){
  quizEl.innerHTML = '';
  data.forEach((q, qi) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'q';
    wrapper.dataset.idx = qi;
    const title = document.createElement('h3');
    title.textContent = `Pregunta ${qi+1}`;
	const p = document.createElement('div');
	p.innerHTML = q.prompt.replace(/\n/g, '<br>');
	const QuestionId = document.createElement('div');
    QuestionId.textContent = q.QuestionId;
    console.log(q)
    const opts = document.createElement('div');
    opts.className = 'opts';
    q.options.forEach(opt => {	 
	  console.log(' ' + opt)
      const id = `q${qi}_${opt.key}`;	  
      const input = document.createElement('input');
      input.type = q.multi ? 'checkbox' : 'radio';
      input.name = `q${qi}`;
      input.value = opt.key;
      input.id = id;
      const label = document.createElement('label');
      label.setAttribute('for', id);
      label.innerHTML = `<b>${opt.key}.</b> ${opt.text}`;
      label.prepend(input);
      opts.appendChild(label);
    });

    const actions = document.createElement('div');
    actions.className = 'row-actions';
    const btn = document.createElement('button');
    btn.textContent = 'Validar';
    btn.addEventListener('click', () => checkOne(qi));
    actions.appendChild(btn);

    const res = document.createElement('div');
    res.className = 'result';
    res.id = `res_${qi}`;


    wrapper.appendChild(QuestionId);
    wrapper.appendChild(title);
    wrapper.appendChild(p);
    wrapper.appendChild(opts);
    wrapper.appendChild(actions);
    wrapper.appendChild(res);
    quizEl.appendChild(wrapper);
  })
}

function checkOne(i){
  const q = data[i];
  const sel = Array.from(document.querySelectorAll(`input[name=q${i}]:checked`)).map(n=>n.value).sort();
  const ans = [...q.answer].sort();
  const ok = sel.length === ans.length && sel.every((v,j)=>v===ans[j]);
  const box = document.querySelectorAll('.q')[i];
  box.classList.remove('correct','incorrect');
  box.classList.add(ok ? 'correct' : 'incorrect');
  const res = document.getElementById(`res_${i}`);
  if(ok){
    res.textContent = '✔️ ¡Correcto!';
  } else {
    res.innerHTML = `❌ Incorrecto. Respuesta correcta: <b>${ans.join(', ')}</b>`;
  }
}

function checkAll(){
  let correct = 0;
  data.forEach((_, i) => {
    const before = document.querySelectorAll('.q')[i].classList.contains('correct');
    checkOne(i);
    if(document.querySelectorAll('.q')[i].classList.contains('correct')) correct++;
  });
  document.getElementById('score').textContent = `Puntaje: ${correct} / ${data.length}`;
}

function resetAll(){
  document.querySelectorAll('input[type=checkbox], input[type=radio]').forEach(i=> i.checked = false);
  document.getElementById('score').textContent='';
  document.querySelectorAll('.q').forEach(q => q.classList.remove('correct','incorrect'));
  document.querySelectorAll('.result').forEach(r => r.textContent='');
}

function shuffle(){
  // Barajar preguntas y opciones
  for(let i=data.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [data[i], data[j]] = [data[j], data[i]];
  }
  data.forEach(q => {
    for(let i=q.options.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }
  });
  render();
}

render();
document.getElementById('checkAll').addEventListener('click', checkAll);
document.getElementById('resetAll').addEventListener('click', resetAll);
document.getElementById('shuffleBtn').addEventListener('click', shuffle);
</script>
</body>
</html>
